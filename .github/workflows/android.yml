name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 需要赋予 GitHub Actions 读写 Release 的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK as Artifact (留底备份)
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create GitHub Release (发布新版本)
      # 只在推送到主分支时发布，避免 PR 产生正式 Release
      if: github.event_name == 'push' 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RUN_NUMBER: ${{ github.run_number }}
      run: |
        TAG_NAME="v1.0.${RUN_NUMBER}"
        # 创建带独立版本号的新 Release 并附带刚打好的 APK
        gh release create "$TAG_NAME" app/build/outputs/apk/debug/app-debug.apk \
          --title "APK $TAG_NAME (自动构建)" \
          --notes "由 GitHub Actions 在推送 main 分支后自动编译生成。内部版本号：$TAG_NAME"
